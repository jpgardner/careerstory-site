<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Loan Agreement — Gardner / Belohlavy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f0e0d;
  --ink2:#4a4845;
  --ink3:#8a8784;
  --paper:#faf9f7;
  --cream:#f0ede6;
  --rule:#dedad4;
  --gold:#b08d57;
  --gold-lt:#f5ead8;
  --green:#2d6a4f;
  --green-lt:#e8f5ee;
  --blue-lt:#eef4ff;
  --blue:#2a5cbf;
  --red:#c0392b;
  --r:6px;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;min-height:100vh;display:flex;justify-content:center;padding:3rem 1rem 6rem;}
.page{width:100%;max-width:620px;}
.masthead{text-align:center;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--rule);}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:.75rem;}
.masthead h1{font-family:var(--serif);font-size:28px;font-weight:400;line-height:1.2;margin-bottom:.4rem;}
.masthead p{font-size:13px;color:var(--ink3);}
.progress{display:flex;gap:5px;margin-bottom:2.5rem;}
.step{flex:1;height:2px;border-radius:99px;background:var(--rule);transition:background .4s;}
.step.done{background:var(--ink);}
.step.active{background:var(--gold);}
.sec-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
table.terms{width:100%;border-collapse:collapse;margin-bottom:1.5rem;}
table.terms tr{border-bottom:1px solid var(--rule);}
table.terms tr:last-child{border-bottom:none;}
table.terms td{padding:10px 0;font-size:13.5px;vertical-align:top;line-height:1.55;}
table.terms td:first-child{color:var(--ink2);width:44%;padding-right:1rem;}
table.terms td:last-child{color:var(--ink);font-weight:400;}
.notice{border-left:3px solid var(--gold);background:var(--gold-lt);padding:12px 16px;border-radius:0 var(--r) var(--r) 0;font-size:13px;color:#6b5020;line-height:1.65;margin-bottom:1.5rem;}
.sig-card{border:1px solid var(--rule);border-radius:var(--r);padding:1.25rem;background:#fff;margin-bottom:1.25rem;}
.sig-card label{display:block;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.sig-card input{width:100%;border:none;border-bottom:1px solid var(--rule);background:transparent;font-family:var(--serif);font-size:22px;color:var(--ink);padding:6px 0;outline:none;transition:border-color .2s;}
.sig-card input:focus{border-color:var(--gold);}
.sig-card input::placeholder{color:var(--rule);font-style:italic;}
.sig-meta{margin-top:8px;font-size:12px;color:var(--ink3);}
.signed-box{background:var(--green-lt);border:1px solid #b7dcc9;border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;}
.signed-box .name{font-family:var(--serif);font-size:22px;color:var(--ink);margin-bottom:5px;}
.signed-box .detail{font-size:12px;color:var(--green);}
.share-box{background:var(--blue-lt);border:1px solid #c0d0ef;border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem;}
.share-box p{font-size:13px;color:var(--blue);margin-bottom:10px;line-height:1.55;}
.url-row{display:flex;gap:8px;align-items:center;}
.url-row input{flex:1;background:#fff;border:1px solid #c0d0ef;border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--ink2);font-family:var(--sans);outline:none;}
.copy-btn{background:var(--blue);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.copy-btn:hover{opacity:.85;}
.copy-btn.copied{background:var(--green);}
.btn{display:block;width:100%;padding:14px;background:var(--ink);color:var(--paper);font-family:var(--sans);font-size:14px;font-weight:500;letter-spacing:.03em;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s;margin-top:1.5rem;}
.btn:hover:not(:disabled){opacity:.85;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.complete-top{text-align:center;padding:1.5rem 0 2rem;}
.complete-icon{width:52px;height:52px;background:var(--ink);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.complete-top h2{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:.5rem;}
.complete-top p{font-size:14px;color:var(--ink3);}
.id-badge{display:inline-block;background:var(--cream);border:1px solid var(--rule);border-radius:var(--r);padding:6px 14px;font-size:11px;font-weight:500;letter-spacing:.1em;color:var(--ink2);margin-top:1rem;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--red);font-size:13px;margin-top:.75rem;text-align:center;min-height:18px;}
</style>
</head>
<body>
<div class="page">

  <div class="masthead">
    <div class="eyebrow">Personal Loan Agreement</div>
    <h1>Gardner &amp; Belohlavy</h1>
    <p>Kansas City, Missouri · April 2026</p>
  </div>

  <div class="progress">
    <div class="step" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <div id="app"></div>

</div>

<script>
// ─── EMAILJS CONFIG ────────────────────────────────────────────────────
// 1. Sign up free at https://www.emailjs.com
// 2. Add Gmail as a service → copy the Service ID
// 3. Create a template (see SETUP.md) → copy the Template ID
// 4. Go to Account → copy your Public Key
// Paste all three values below:

const EMAILJS_PUBLIC_KEY  = '22zJDJf7u6XIqLjDS';
const EMAILJS_SERVICE_ID  = 'service_rkmhdri';
const EMAILJS_TEMPLATE_ID = 'template_yy27da8';
// ──────────────────────────────────────────────────────────────────────

emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

const TERMS = {
  lenderName:    'Justin Gardner',
  lenderEmail:   'justinpgardner@gmail.com',
  borrowerName:  'Sarah Belohlavy',
  borrowerEmail: 'sarah.beloh@gmail.com',
  loanAmount:    '$1,600.00',
  startDate:     'April 11, 2026',
  gracePeriodEnd:'July 10, 2026',
  hardDeadline:  'August 20, 2026',
  interestRate:  '10% per calendar month',
  purpose:       'Rental deposit and first month\u2019s rent'
};

function setProgress(step) {
  document.getElementById('s1').className = 'step' + (step>1?' done':step===1?' active':'');
  document.getElementById('s2').className = 'step' + (step>2?' done':step===2?' active':'');
  document.getElementById('s3').className = 'step' + (step===3?' active':'');
}

function termsHTML() {
  const rows = [
    ['Lender', TERMS.lenderName],
    ['Borrower', TERMS.borrowerName],
    ['Principal', TERMS.loanAmount],
    ['Purpose', TERMS.purpose],
    ['Effective date', TERMS.startDate],
    ['0% interest through', TERMS.gracePeriodEnd],
    ['Interest after grace period', TERMS.interestRate + ' on outstanding balance'],
    ['Early repayment trigger', 'Immediately upon receipt of World Cup rental income'],
    ['Hard repayment deadline', TERMS.hardDeadline],
    ['Governing law', 'State of Missouri'],
  ];
  return '<table class="terms">' + rows.map(([k,v])=>
    `<tr><td>${k}</td><td>${v}</td></tr>`
  ).join('') + '</table>';
}

function todayStr() {
  return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function nowStr() {
  return new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});
}

function genId() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function encodeState(obj) {
  return btoa(encodeURIComponent(JSON.stringify(obj)));
}

function decodeState(str) {
  try { return JSON.parse(decodeURIComponent(atob(str))); }
  catch { return null; }
}

function getURLState() {
  const p = new URLSearchParams(window.location.search);
  const d = p.get('d');
  return d ? decodeState(d) : null;
}

function buildShareURL(state) {
  const base = window.location.origin + window.location.pathname;
  return base + '?d=' + encodeState(state);
}

// ─── SCREENS ──────────────────────────────────────────────────────────

function showLenderSign() {
  setProgress(1);
  document.getElementById('app').innerHTML = `
    <div class="sec-label">Loan terms</div>
    ${termsHTML()}
    <div class="notice">
      By signing below, you confirm you are <strong>${TERMS.lenderName}</strong>, the lender, and agree to extend a loan of ${TERMS.loanAmount} under the terms above. This is legally binding under Missouri law and the federal ESIGN Act.
    </div>
    <div class="sig-card">
      <label>Lender signature — type your full name</label>
      <input type="text" id="sig" placeholder="Justin Gardner" autocomplete="name" autocorrect="off" spellcheck="false"/>
      <div class="sig-meta">Signing as lender &nbsp;·&nbsp; ${todayStr()}</div>
    </div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doLenderSign()" disabled>Sign as lender &rarr;</button>
  `;
  document.getElementById('sig').addEventListener('input', function() {
    document.getElementById('btn').disabled = this.value.trim().length < 2;
  });
}

function doLenderSign() {
  const name = document.getElementById('sig').value.trim();
  if (!name) return;
  const state = {
    lenderSig:  name,
    lenderAt:   nowStr(),
    agreementId: genId()
  };
  const shareURL = buildShareURL(state);
  showShareLink(state, shareURL);
}

function showShareLink(state, url) {
  setProgress(1);
  document.getElementById('app').innerHTML = `
    <div class="signed-box" style="margin-bottom:1.5rem;">
      <div class="name">${state.lenderSig}</div>
      <div class="detail">Justin Gardner &nbsp;·&nbsp; Lender &nbsp;·&nbsp; ${state.lenderAt}</div>
    </div>
    <div class="share-box">
      <p><strong>Your signature is recorded.</strong> Now send this link to Sarah — she'll open it, review the full terms, and sign as borrower. Once she signs, both of you will receive the executed agreement by email.</p>
      <div class="url-row">
        <input type="text" id="shareUrl" value="${url}" readonly onclick="this.select()"/>
        <button class="copy-btn" id="copyBtn" onclick="copyURL()">Copy link</button>
      </div>
    </div>
    <p style="font-size:12px;color:var(--ink3);text-align:center;line-height:1.6;">You can also text or email this link directly to Sarah. The link contains your signature — no login required on her end.</p>
  `;
}

function copyURL() {
  const url = document.getElementById('shareUrl').value;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 2500);
  });
}

function showBorrowerSign(lenderState) {
  setProgress(2);
  document.getElementById('app').innerHTML = `
    <div class="sec-label">Loan terms</div>
    ${termsHTML()}
    <div class="sec-label" style="margin-top:1.5rem;">Lender has signed</div>
    <div class="signed-box">
      <div class="name">${lenderState.lenderSig}</div>
      <div class="detail">Justin Gardner &nbsp;·&nbsp; Lender &nbsp;·&nbsp; ${lenderState.lenderAt}</div>
    </div>
    <div class="notice">
      By signing below, <strong>${TERMS.borrowerName}</strong>, you agree to all terms above — including 10% monthly interest beginning July 11, 2026, and the hard repayment deadline of ${TERMS.hardDeadline}. This is legally binding under Missouri law and the federal ESIGN Act.
    </div>
    <div class="sig-card">
      <label>Borrower signature — type your full name</label>
      <input type="text" id="sig" placeholder="Sarah Belohlavy" autocomplete="name" autocorrect="off" spellcheck="false"/>
      <div class="sig-meta">Signing as borrower &nbsp;·&nbsp; ${todayStr()}</div>
    </div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn" onclick="doBorrowerSign()" disabled>Sign and execute agreement &rarr;</button>
  `;
  document.getElementById('sig').addEventListener('input', function() {
    document.getElementById('btn').disabled = this.value.trim().length < 2;
  });
}

async function doBorrowerSign() {
  const name = document.getElementById('sig').value.trim();
  if (!name) return;
  const lenderState = getURLState();
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending agreement...';

  const fullState = {
    ...lenderState,
    borrowerSig: name,
    borrowerAt: nowStr()
  };

  try {
    await sendEmails(fullState);
    showComplete(fullState);
  } catch(e) {
    document.getElementById('err').textContent = 'Email delivery failed: ' + e.message + '. Screenshot this page as your record.';
    btn.disabled = false;
    btn.innerHTML = 'Retry &rarr;';
    showComplete(fullState, true);
  }
}

async function sendEmails(s) {
  const agreement = generateAgreementText(s);
  const subject = `Executed Loan Agreement — Gardner / Belohlavy — ID: ${s.agreementId}`;

  // Send to lender
  await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email:       TERMS.lenderEmail,
    to_name:        TERMS.lenderName,
    subject:        subject,
    agreement_text: agreement,
    agreement_id:   s.agreementId
  });

  // Send to borrower
  await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email:       TERMS.borrowerEmail,
    to_name:        TERMS.borrowerName,
    subject:        subject,
    agreement_text: agreement,
    agreement_id:   s.agreementId
  });
}

function generateAgreementText(s) {
  return `PERSONAL LOAN AGREEMENT — FULLY EXECUTED
${'─'.repeat(58)}
Effective Date:  ${TERMS.startDate}
Agreement ID:    ${s.agreementId}

PARTIES
  Lender:   ${TERMS.lenderName} <${TERMS.lenderEmail}>
  Borrower: ${TERMS.borrowerName} <${TERMS.borrowerEmail}>

LOAN DETAILS
  Principal Amount: ${TERMS.loanAmount}
  Purpose:          ${TERMS.purpose}

REPAYMENT TERMS

  1. Interest-Free Period
     0% interest from ${TERMS.startDate} through ${TERMS.gracePeriodEnd}
     (90 calendar days).

  2. Interest After Grace Period
     Beginning July 11, 2026, interest accrues at ${TERMS.interestRate}
     on the outstanding principal balance until paid in full.

  3. Early Repayment Trigger
     Borrower agrees to repay the full outstanding balance immediately
     upon receipt of rental income from the FIFA World Cup 2026 rental
     period, anticipated in early-to-mid July 2026.

  4. Hard Repayment Deadline
     Full outstanding balance (including any accrued interest) is due
     no later than ${TERMS.hardDeadline}.

SAMPLE INTEREST SCHEDULE (if balance unpaid after grace period)
  July 11, 2026:    $1,600.00 principal + $0 interest   = $1,600.00 due
  August 11, 2026:  $1,600.00 principal + $160.00 (10%) = $1,760.00 due
  September 11:     $1,600.00 principal + $320.00 (20%) = $1,920.00 due

DEFAULT
  Failure to repay by ${TERMS.hardDeadline} constitutes default.
  Lender reserves all legal remedies available under Missouri law.

GOVERNING LAW
  Governed by the laws of the State of Missouri.
  Valid under the federal ESIGN Act and Missouri's UETA.

${'─'.repeat(58)}
SIGNATURES

  LENDER
  Signature: ${s.lenderSig}
  Party:     Justin Gardner
  Date/Time: ${s.lenderAt}

  BORROWER
  Signature: ${s.borrowerSig}
  Party:     Sarah Belohlavy
  Date/Time: ${s.borrowerAt}

${'─'.repeat(58)}
This document was executed electronically. Copies were delivered to
${TERMS.lenderEmail} and ${TERMS.borrowerEmail}.
`;
}

function showComplete(s, emailFailed) {
  setProgress(3);
  document.getElementById('app').innerHTML = `
    <div class="complete-top">
      <div class="complete-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Agreement executed</h2>
      <p>${emailFailed ? 'Signatures recorded — email delivery failed, screenshot this page.' : 'Copies sent to both parties via email'}</p>
      <div class="id-badge">Agreement ID: ${s.agreementId}</div>
    </div>
    <div class="sec-label">Signatures on file</div>
    <div class="signed-box" style="margin-bottom:10px;">
      <div class="name">${s.lenderSig}</div>
      <div class="detail">Justin Gardner &nbsp;·&nbsp; Lender &nbsp;·&nbsp; ${s.lenderAt}</div>
    </div>
    <div class="signed-box">
      <div class="name">${s.borrowerSig}</div>
      <div class="detail">Sarah Belohlavy &nbsp;·&nbsp; Borrower &nbsp;·&nbsp; ${s.borrowerAt}</div>
    </div>
    <div class="sec-label" style="margin-top:1.5rem;">Executed terms</div>
    ${termsHTML()}
  `;
}

// ─── INIT ──────────────────────────────────────────────────────────────

function init() {
  const urlState = getURLState();
  if (!urlState) {
    showLenderSign();
  } else if (urlState.lenderSig && !urlState.borrowerSig) {
    showBorrowerSign(urlState);
  } else if (urlState.borrowerSig) {
    showComplete(urlState);
  } else {
    showLenderSign();
  }
}

init();
</script>
</body>
</html>
