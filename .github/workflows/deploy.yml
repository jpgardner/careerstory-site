# Validate every client HTML against the brief Section 8 deploy gate,
# then rsync the clients/ tree to the VPS.
#
# Required repo secrets:
#   VPS_SSH_PRIVATE_KEY   private half of the careerstory deploy user's keypair
#   VPS_HOST              VPS hostname or IP
#   VPS_KNOWN_HOSTS       output of `ssh-keyscan <host>` so SSH does not prompt
#
# The mapping from clients/<firstname>-<lastname>-vN.html to a live domain
# lives in /etc/careerstory/clients.json on the VPS. We sync the file under
# its versioned name to /srv/careerstory/sites/<domain>/index.html via a
# small remote step that reads the registry. The simple v1 alternative used
# here: keep one folder per client under clients/<domain>/ during deploy.

name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'clients/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run deploy gate against every client HTML
        run: |
          set -e
          shopt -s nullglob globstar
          files=(clients/**/*.html)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no client HTML files yet, skipping"
            exit 0
          fi
          ./infra/bin/validate.sh "${files[@]}"

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync clients to VPS
        run: |
          set -e
          shopt -s nullglob
          if [ ! -d clients ] || [ -z "$(ls -A clients 2>/dev/null)" ]; then
            echo "clients/ is empty, nothing to deploy"
            exit 0
          fi
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            clients/ \
            careerstory@${{ secrets.VPS_HOST }}:/srv/careerstory/sites/

      - name: Reload Caddy if Caddyfile changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | grep -q '^infra/Caddyfile$'; then
            ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
              careerstory@${{ secrets.VPS_HOST }} \
              'sudo /bin/systemctl reload caddy'
          fi
